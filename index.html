<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traders Street - Official Channel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            /* Telegram-style doodle background */
            background-color: #0e1621;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            background-color: #17212b;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subscribers {
            color: #708499;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .features {
            text-align: left;
            display: inline-block;
            margin-bottom: 30px;
        }

        .feature-item {
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .feature-item span {
            margin-right: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-join {
            background-color: #24a1de;
            color: white;
            text-transform: uppercase;
        }

        .btn-web {
            background-color: transparent;
            border: 2px solid #24a1de;
            color: #24a1de;
            text-transform: uppercase;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #708499;
        }

        footer a {
            color: #24a1de;
            text-decoration: none;
            font-weight: bold;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="https://academylinkx.site/wp-content/uploads/2026/03/immagee.jpg" alt="Traders Street Logo">
        </div>

        <h1>Traders Street</h1>
        <div class="subscribers">3,236 subscribers</div>

        <div class="features">
            <div class="feature-item"><span>✨</span> Official Channel</div>
            <div class="feature-item"><span>✨</span> Crypto Trading</div>
            <div class="feature-item"><span>✨</span> All Stocks</div>
        </div>

        <a href="https://t.me/+wLUIEw1zfmcwMTdl" class="btn btn-join">Join Channel</a>
        <a href="https://t.me/+wLUIEw1zfmcwMTdl" class="btn btn-web">Open in Web</a>
    </div>

    <div class="credit" style="margin-top: 20px; color: #708499; font-size: 12px;">
        ads managed by <a href="https://t.me/+TRlJl628l-FkMWE9" target="_blank" rel="noopener" style="color: #24a1de; text-decoration: none;">@Nexgroww_agency</a>
    </div>

</body>
</html>
