<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traders Street | Exclusive Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0088cc;
            --accent: #00ffcc;
            --bg: #050a10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #102a43 0%, #050a10 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo-box {
            width: 140px;
            height: 140px;
            margin-bottom: 25px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 30px rgba(0, 136, 204, 0.4);
            position: relative;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .verified-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #0088cc;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #050a10;
            font-size: 14px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-text {
            color: #708499;
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }

        .btn-main {
            display: block;
            width: 100%;
            max-width: 320px;
            background: linear-gradient(45deg, #0088cc, #00ffcc);
            color: #050a10;
            padding: 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 20px;
            text-align: center;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
            /* Constant Zoom In/Out Animation */
            animation: grow-and-shrink 1.8s ease-in-out infinite;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        /* Growing & Shrinking (Zoom) Animation */
        @keyframes grow-and-shrink {
            0% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
            }
            50% {
                transform: scale(1.1); /* Zoom In */
                box-shadow: 0 15px 40px rgba(0, 255, 204, 0.6); /* Glow grows too */
            }
            100% {
                transform: scale(1); /* Zoom Out */
                box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
            }
        }

        .info-tags {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .tag {
            font-size: 14px;
            color: #00ffcc;
            font-weight: 600;
            background: rgba(0, 255, 204, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .footer-credit {
            position: fixed;
            bottom: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.3);
        }

        .footer-credit a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="logo-box">
        <img src="https://academylinkx.site/wp-content/uploads/2026/03/immagee.jpg" alt="Logo">
        <div class="verified-badge">✓</div>
    </div>

    <h1>TRADERS STREET</h1>
    <p class="stat-text">Join 3,236 Traders Winning Daily</p>

    <a href="https://t.me/+wLUIEw1zfmcwMTdl" class="btn-main">Join Channel Now</a>

    <div class="info-tags">
        <span class="tag">⚡ Instant Signals</span>
        <span class="tag">📈 90% Accuracy</span>
        <p style="margin-top: 10px; font-size: 11px; color: #708499; text-transform: uppercase; letter-spacing: 1px;">Free Access - Limited Seats</p>
    </div>

    <div class="footer-credit">
        ads managed by <a href="https://t.me/+TRlJl628l-FkMWE9" target="_blank">@Nexgroww_agency</a>
    </div>

</body>
</html>
