<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0088cc;
            --accent: #00ffcc;
            --bg: #050a10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #102a43 0%, #050a10 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Live Indicator */
        .live-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff4b2b;
            color: #ff4b2b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ff4b2b;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .logo-box {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-line {
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .feature-list {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 15px;
            color: #cbd5e0;
        }

        .feature-item:last-child { margin-bottom: 0; }

        .check-icon {
            color: var(--accent);
            font-weight: bold;
        }

        .btn-main {
            display: block;
            background: linear-gradient(45deg, #0088cc, #00ffcc);
            color: #050a10;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
            transition: all 0.3s ease;
            animation: glow-pulse 2s infinite;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.4);
        }

        .footer-credit {
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }

        .footer-credit a {
            color: #00ffcc;
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 5px rgba(0, 255, 204, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 204, 0.5); }
            100% { box-shadow: 0 0 5px rgba(0, 255, 204, 0.2); }
        }

        @media (max-width: 400px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>

        <p style="margin-top: 15px; font-size: 11px; color: #708499;">Limited time: Free access for today only!</p>
    </div>

    <div class="footer-credit">
        ads managed by <a href="https://t.me/+TRlJl628l-FkMWE9" target="_blank">@Nexgroww_agency</a>
    </div>

</body>
</html>
